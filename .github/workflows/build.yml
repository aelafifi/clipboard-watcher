name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pywin32 pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name ClipboardWatcher
          main.py

      - name: Upload artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardWatcher-windows
          path: dist/ClipboardWatcher.exe
          retention-days: 30

      - name: Create GitHub Release (on version tags only)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/ClipboardWatcher.exe
